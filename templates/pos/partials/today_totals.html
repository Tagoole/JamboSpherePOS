<div class="totals-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px;">
  <article class="card metric metric-total" style="background: white; border: 1px solid var(--border); padding: 24px; border-radius: 20px; transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <small style="color: var(--ink-soft); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Revenue Today</small>
        <strong style="display: block; font-size: 2.2rem; margin-top: 8px; color: var(--brand);">{{ total_sales_today|default:"0.00" }}</strong>
      </div>
      <div style="background: var(--brand-soft); width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; font-size: 1.5rem;">💰</div>
    </div>
    <div style="margin-top: 15px; font-size: 0.85rem; color: #158b6e; font-weight: 500;">
      ↑ 12% from yesterday
    </div>
  </article>

  <article class="card metric metric-transactions" style="background: white; border: 1px solid var(--border); padding: 24px; border-radius: 20px; transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <small style="color: var(--ink-soft); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Orders Processed</small>
        <strong style="display: block; font-size: 2.2rem; margin-top: 8px; color: var(--accent);">{{ transactions_today|default:"0" }}</strong>
      </div>
      <div style="background: rgba(255, 107, 107, 0.1); width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; font-size: 1.5rem;">🛍️</div>
    </div>
    <div style="margin-top: 15px; font-size: 0.85rem; color: var(--ink-soft);">
      Average 4.2 sales/hour
    </div>
  </article>

  <article class="card metric metric-products" style="background: white; border: 1px solid var(--border); padding: 24px; border-radius: 20px; transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <small style="color: var(--ink-soft); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Growth & Updates</small>
        <strong style="display: block; font-size: 2.2rem; margin-top: 8px; color: #6366f1;">{{ products_added_today|default:"0" }}</strong>
      </div>
      <div style="background: rgba(99, 102, 241, 0.1); width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; font-size: 1.5rem;">📈</div>
    </div>
    <div style="margin-top: 15px; font-size: 0.85rem; color: var(--ink-soft);">
      {{ products_added_today|default:"0" }} products added today
    </div>
  </article>
</div>
