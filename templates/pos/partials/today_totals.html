<div class="totals-grid">
  <article class="card metric metric-total">
    <small>Total Sales Today</small>
    <strong>{{ total_sales_today|default:"0.00" }}</strong>
  </article>

  <article class="card metric metric-transactions">
    <small>Transactions</small>
    <strong>{{ transactions_today|default:"0" }}</strong>
  </article>

  <article class="card metric metric-products">
    <small>Products Added</small>
    <strong>{{ products_added_today|default:"0" }}</strong>
  </article>
</div>
