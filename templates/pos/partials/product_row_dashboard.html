{% load humanize %}
{% for product in products %}
<tr>
  <td style="font-weight: 500;">{{ product.name }}</td>
  <td style="text-align: right; font-weight: 600;">UGX {{ product.price|intcomma }}</td>
</tr>
{% empty %}
<tr>
  <td colspan="3">
    <div class="empty">No products yet. Add your first product from the products page.</div>
  </td>
</tr>
{% endfor %}
