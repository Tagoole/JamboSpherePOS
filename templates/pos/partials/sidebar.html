<aside class="sidebar" id="main-sidebar" style="position: relative; flex-shrink: 0;">
  <div class="brand" style="justify-content: center; margin-bottom: 40px; padding: 10px 0;">
    <span class="brand-badge" style="width: 40px; height: 40px; font-size: 1.2rem;">JS</span>
    <div class="brand-title" style="margin-left: 12px; font-size: 1.1rem; letter-spacing: 0.5px;">Jambo Sphere</div>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column; gap: 12px; align-items: stretch;">
    <a class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}" href="/dashboard/" title="Dashboard">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">📊</div> 
      <span class="link-text">Dashboard</span>
    </a>
    <a class="nav-link {% if request.path == '/products/' %}active{% endif %}" href="/products/" title="Products">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">📦</div> 
      <span class="link-text">Products</span>
    </a>
    <a class="nav-link {% if request.path == '/sales/' %}active{% endif %}" href="/sales/" title="Sales">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">💰</div> 
      <span class="link-text">Sales</span>
    </a>
    <a class="nav-link {% if request.path == '/analytics/' %}active{% endif %}" href="/analytics/" title="Analytics">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">📈</div> 
      <span class="link-text">Analytics</span>
    </a>
    <a class="nav-link {% if '/reports/' in request.path %}active{% endif %}" href="/reports/daily/" title="Daily Reports">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">📅</div> 
      <span class="link-text">Reports</span>
    </a>
    <a class="nav-link {% if request.path == '/notifications/' %}active{% endif %}" href="/notifications/" title="Notifications">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">🔔</div> 
      <span class="link-text">Notifications</span>
    </a>
  </div>

  <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
    <a class="nav-link" href="/logout/" style="color: rgba(255,255,255,0.4);" title="Logout">
      <div class="icon-wrapper" style="min-width: 40px; height: 40px; display: grid; place-items: center; font-size: 1.2rem;">🚪</div> 
      <span class="link-text">Logout</span>
    </a>
  </div>

  <!-- Manual Toggle for Precise Control -->
  <button id="sidebar-toggle" style="position: absolute; right: -12px; top: 110px; background: var(--brand); border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1002;">
    <span id="toggle-icon">❮</span>
  </button>
</aside>

<script>
  (function() {
    const sidebar = document.getElementById('main-sidebar');
    const toggle = document.getElementById('sidebar-toggle');
    const icon = document.getElementById('toggle-icon');
    const mainContent = document.querySelector('.main');
    
    function setSidebarState(collapsed) {
      if (collapsed) {
        sidebar.classList.add('collapsed');
        icon.innerText = '❯';
      } else {
        sidebar.classList.remove('collapsed');
        icon.innerText = '❮';
      }
      localStorage.setItem('sidebar-collapsed', collapsed);
    }

    // Initial State
    const isCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
    setSidebarState(isCollapsed);

    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      setSidebarState(!sidebar.classList.contains('collapsed'));
    });

    // Auto-collapse when clicking on the main screen side
    mainContent.addEventListener('click', () => {
      if (!sidebar.classList.contains('collapsed')) {
        setSidebarState(true);
      }
    });
  })();
</script>
