{% for cat in categories %}
<div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px;">
  <div>
    <strong style="display: block; font-size: 0.95rem; color: var(--ink);">{{ cat.name }}</strong>
    <small style="color: var(--ink-soft); font-size: 0.85rem;">{{ cat.products.count }} product{{ cat.products.count|pluralize }}</small>
  </div>
  <div style="display: flex; gap: 8px;">
    <a href="{% url 'category-edit-page' cat.id %}" class="btn" style="padding: 6px 12px; font-size: 0.85rem; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: none;">Edit</a>
    <button hx-post="{% url 'category-delete' cat.id %}" hx-target="#category-list" hx-swap="innerHTML" style="padding: 6px 12px; font-size: 0.85rem; background: rgba(255, 71, 87, 0.1); color: var(--danger); border: none; border-radius: 8px; cursor: pointer;" onclick="if(!confirm('Delete this category? Products will be ungrouped.')) return false;">Delete</button>
  </div>
</div>
{% empty %}
<div style="padding: 40px 20px; text-align: center; color: var(--ink-soft);">
  <p style="margin: 0;">No categories yet. Create one above!</p>
</div>
{% endfor %}
