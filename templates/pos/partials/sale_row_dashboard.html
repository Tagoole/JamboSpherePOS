{% for sale in sales %}
<tr>
  <td>{{ sale.created_at_display }}</td>
  <td>{{ sale.product_name }}</td>
  <td>{{ sale.quantity }}</td>
  <td>{{ sale.total_amount }}</td>
</tr>
{% empty %}
<tr>
  <td colspan="4">
    <div class="empty">No sales recorded yet for today.</div>
  </td>
</tr>
{% endfor %}
