{% load humanize %}
{% for sale in sales %}
<tr>
  <td>{{ sale.created_at_display }}</td>
  <td>#{{ sale.id }}</td>
  <td style="text-align: right; font-weight: 600;">UGX {{ sale.total_amount|intcomma }}</td>
</tr>
{% empty %}
<tr>
  <td colspan="4">
    <div class="empty">No sales recorded yet for today.</div>
  </td>
</tr>
{% endfor %}
