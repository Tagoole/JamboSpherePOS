{% extends "base.html" %}

{% block title %}Daily Totals | Jambo Sphere POS{% endblock %}

{% block content %}
<div class="shell">
  {% include "pos/partials/sidebar.html" %}

  <main class="main">
    <header class="page-header">
      <div>
        <h1>Daily Sales Summary</h1>
        <p>Track revenue and sold products by selected sales date.</p>
      </div>
      <div class="field" style="min-width: 280px; margin-bottom: 0;">
        <label for="report-date-select">Filter By Sales Date</label>
        <select
          id="report-date-select"
          name="report_date"
          hx-get="/partials/daily-summary-details/"
          hx-target="#daily-details-panel"
          hx-swap="innerHTML"
        >
          {% for date_opt in sale_dates %}
            <option value="{{ date_opt.value }}" {% if date_opt.value == selected_report_date %}selected{% endif %}>
              {{ date_opt.label }}
            </option>
          {% endfor %}
        </select>
      </div>
    </header>

    <section
      id="daily-details-panel"
      hx-get="/partials/daily-summary-details/"
      hx-trigger="load, every 15s, salesChanged from:body, productsChanged from:body"
      hx-include="#report-date-select"
      hx-swap="innerHTML"
      style="margin-top: 4px;"
    >
      {% include "pos/partials/daily_summary_detail.html" %}
    </section>
  </main>
</div>

<script>
  (function () {
    function refreshDailyDetails() {
      if (window.htmx) {
        window.htmx.trigger(document.getElementById("daily-details-panel"), "load");
      }
    }

    document.addEventListener("salesChanged", refreshDailyDetails);
    document.addEventListener("productsChanged", refreshDailyDetails);
  })();
</script>
{% endblock %}
