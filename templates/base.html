{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% progressive_web_app_meta %}
  <link rel="manifest" href="/manifest.json" />
  <title>{% block title %}Jambo Sphere POS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f0f5f4;
      --bg-soft: #e6efee;
      --surface: rgba(255, 255, 255, 0.7);
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.4);
      --ink: #101e1f;
      --ink-soft: #5b7578;
      --brand: #19b48f;
      --brand-soft: #d9f7ef;
      --accent: #2dd4a6;
      --accent-2: #8ce7d0;
      --accent-3: #14a37f;
      --danger: #ff4757;
      --border: rgba(0, 0, 0, 0.05);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 8% 2%, #dbece9 0%, transparent 24%),
        radial-gradient(circle at 95% 88%, #dbece8 0%, transparent 26%),
        radial-gradient(circle at 74% 20%, #f8fbfb 0%, transparent 16%),
        var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--ink);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      background:
        linear-gradient(180deg, #0f1c1e, #132426);
      color: #f3f6ff;
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 250px;
      z-index: 1000;
    }

    .sidebar.collapsed {
      width: 80px;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -85px;
      bottom: -70px;
      background: radial-gradient(circle, rgba(152, 242, 216, 0.45), transparent 65%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #ddfff4, #8ce7d0);
      display: grid;
      place-items: center;
      color: #095051;
      font-weight: 700;
    }

    .brand-title {
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      color: rgba(228, 246, 243, 0.92);
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
      z-index: 1;
      white-space: nowrap;
      overflow: hidden;
    }
    
    .sidebar.collapsed .nav-link span {
      display: none;
    }

    .sidebar.collapsed .brand-title {
      display: none;
    }

    .sidebar.collapsed .brand {
      justify-content: center;
    }

    .nav-link:hover {
      transform: translateX(3px);
      background: rgba(143, 238, 205, 0.18);
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      backdrop-filter: blur(5px);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-link.active::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
    }

    .shell {
      display: flex;
      min-height: 100vh;
    }

    .main {
      flex: 1;
      padding: 26px;
      background: #f3f7f7;
      min-width: 0;
      transition: margin-left 0.4s ease;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      animation: rise-in 350ms ease;
    }

    .page-header p {
      color: var(--ink-soft);
      margin: 4px 0 0;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .dashboard-metrics {
      gap: 24px;
      margin-bottom: 24px;
    }

    .dashboard-panels {
      gap: 24px;
      margin-top: 8px;
      align-items: stretch;
    }

    .sales-layout {
      gap: 24px;
      align-items: stretch;
    }

    .sales-shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    .sales-form-sidebar {
      position: sticky;
      top: 20px;
    }

    .sales-content {
      display: grid;
      gap: 24px;
      min-width: 0;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .totals-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      align-items: stretch;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      animation: rise-in 320ms ease;
    }

    .main > .card,
    .main > section.card {
      background: #ffffff;
    }

    .panel-accent-teal {
      border-top: 4px solid #19b48f;
      background: linear-gradient(180deg, #ffffff 0%, #f6fffb 100%);
    }

    .panel-accent-blue {
      border-top: 4px solid #2f80ed;
      background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
    }

    .panel-accent-green {
      border-top: 4px solid #27ae60;
      background: linear-gradient(180deg, #ffffff 0%, #f3fff6 100%);
    }

    .panel-accent-amber {
      border-top: 4px solid #f59e0b;
      background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
    }

    .panel-accent-purple {
      border-top: 4px solid #8b5cf6;
      background: linear-gradient(180deg, #ffffff 0%, #f8f4ff 100%);
    }

    .metric {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 8px;
      min-height: 118px;
      background: linear-gradient(160deg, #ffffff, var(--metric-tint, #f7fffd));
      border-top: 4px solid var(--metric-accent, #19b48f);
    }

    .metric::after {
      content: "";
      position: absolute;
      right: -24px;
      top: -24px;
      width: 88px;
      height: 88px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(16, 183, 176, 0.1), transparent 70%);
      pointer-events: none;
    }

    .metric-total {
      --metric-accent: #3b82f6;
      --metric-tint: #f4f8ff;
    }

    .metric-transactions {
      --metric-accent: #22c55e;
      --metric-tint: #f3fff6;
    }

    .metric-products {
      --metric-accent: #f59e0b;
      --metric-tint: #fffaf0;
    }

    .metric small {
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .metric strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.2rem, 2.6vw, 1.7rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
      color: var(--metric-accent, var(--brand));
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-family: "IBM Plex Sans", sans-serif;
      transition: transform 120ms ease, box-shadow 120ms ease;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(22, 112, 104, 0.22);
    }

    .btn-primary {
      background: linear-gradient(135deg, #19b48f, #2dd4a6);
      color: #ffffff;
    }

    .btn-secondary {
      background: #eff7f6;
      color: #205a5f;
      border: 1px solid #d9e8e6;
    }

    .btn-danger {
      background: #f8e7e5;
      color: var(--danger);
      border: 1px solid #f2cdca;
    }

    .btn.active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(25, 180, 143, 0.3);
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 0.9rem;
      color: #355c60;
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
      background: #fbfdfd;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #5acfb0;
      box-shadow: 0 0 0 3px rgba(45, 212, 166, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.96rem;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #edf3f2;
    }

    th,
    td {
      text-align: left;
      padding: 11px;
      border-bottom: 1px solid #edf2f2;
      vertical-align: middle;
    }

    th {
      color: #5f7f82;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #f8fbfb;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      display: inline-block;
      background: #e5fbf9;
      color: #0f6f73;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-link {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 0.84rem;
      border: 1px solid var(--border);
      background: #eefbfb;
      color: #0f666b;
      font-weight: 600;
    }

    .btn-link:hover {
      background: #e3f7f2;
    }

    .summary-mini {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .summary-mini .card {
      padding: 14px;
      box-shadow: 0 8px 20px rgba(10, 96, 102, 0.09);
    }

    .summary-mini strong {
      display: block;
      font-size: 1.2rem;
      margin-top: 4px;
      color: var(--brand);
      font-family: "Space Grotesk", sans-serif;
    }

    .auth-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .auth-hero {
      background:
        linear-gradient(145deg, rgba(8, 100, 106, 0.88), rgba(17, 162, 165, 0.8)),
        url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1400&q=80") center/cover;
      padding: 46px;
      color: #eefcf3;
      display: grid;
      align-content: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .auth-hero::before,
    .auth-hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(3px);
    }

    .auth-hero::before {
      width: 210px;
      height: 210px;
      right: -40px;
      top: -40px;
      background: radial-gradient(circle, rgba(209, 255, 251, 0.78), transparent 70%);
    }

    .auth-hero::after {
      width: 220px;
      height: 220px;
      left: -60px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(141, 237, 232, 0.58), transparent 70%);
    }

    .auth-panel {
      display: grid;
      align-content: center;
      padding: 34px;
    }

    .auth-card {
      max-width: 470px;
      width: 100%;
    }

    .auth-card .card {
      padding: 28px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 16px 30px rgba(13, 56, 61, 0.09);
    }

    .auth-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .auth-chip {
      padding: 11px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.32);
      font-size: 0.86rem;
      backdrop-filter: blur(2px);
    }

    .auth-chip strong {
      display: block;
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      color: #ecfffd;
    }

    .auth-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 9px;
      position: relative;
      z-index: 1;
    }

    .auth-list li {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
    }

    .auth-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #a7f3ef, #27d0c8);
      box-shadow: 0 0 0 4px rgba(208, 252, 249, 0.22);
      flex-shrink: 0;
    }

    .summary-card {
      border-top: 4px solid #3b82f6;
      background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
    }

    .summary-card-alt {
      border-top: 4px solid #10b7b0;
      background: linear-gradient(180deg, #ffffff 0%, #f3fffe 100%);
    }

    .summary-card-warm {
      border-top: 4px solid #22c55e;
      background: linear-gradient(180deg, #ffffff 0%, #f3fff6 100%);
    }

    .summary-card-soft {
      border-top: 4px solid #f59e0b;
      background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
    }

    .muted {
      color: #537465;
      font-size: 0.92rem;
    }

    .empty {
      border: 1px dashed #c4d8ca;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #557060;
      background: #f8fcf9;
    }

    .tag-pending {
      background: #fff4db;
      color: #8a620d;
    }

    .sync-status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1200;
      background: #0f686d;
      color: #ecfefe;
      border-radius: 12px;
      padding: 10px 12px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 22px rgba(7, 74, 77, 0.34);
      max-width: min(420px, calc(100vw - 24px));
    }

    .sync-status p {
      margin: 0;
      font-size: 0.9rem;
    }

    .sync-status button {
      border: 0;
      border-radius: 8px;
      padding: 7px 10px;
      background: #d7fbf9;
      color: #0f686d;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    @keyframes rise-in {
      from {
        transform: translateY(7px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 1024px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .auth-wrap {
        grid-template-columns: 1fr;
      }

      .auth-hero {
        min-height: 220px;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 18px;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .sales-shell {
        grid-template-columns: 1fr;
      }

      .sales-form-sidebar {
        position: static;
      }

      .summary-mini {
        grid-template-columns: 1fr;
      }

      .page-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  
  <footer class="no-print" style="text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 0.85rem; background: transparent;">
    <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); pt: 30px;">
      <p>&copy; 2026 Jambo Sphere POS. All rights reserved.</p>
      <div style="display: flex; gap: 20px;">
        <span>System Status: <span style="color: #158b6e; font-weight: 600;">Optimal</span></span>
        <span>Version: 2.1.0-Emerald</span>
      </div>
    </div>
  </footer>

  <div id="sync-status-banner" class="sync-status" role="status" aria-live="polite">
    <p id="sync-status-text"></p>
    <button id="sync-now-btn" type="button">Sync now</button>
  </div>
  <script src="{% static 'js/offline-sync.js' %}"></script>
</body>
</html>
