{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% progressive_web_app_meta %}
  <link rel="manifest" href="/manifest.json" />
  <title>{% block title %}Jambo Sphere POS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f4fffe;
      --bg-soft: #e8fbf9;
      --surface: #ffffff;
      --ink: #12373a;
      --ink-soft: #3a6366;
      --brand: #10b7b0;
      --brand-soft: #dcf8f6;
      --accent: #25cfc8;
      --accent-2: #8cebe7;
      --accent-3: #14b8a6;
      --danger: #c0392b;
      --border: #cfeeed;
      --shadow: 0 14px 30px rgba(10, 96, 102, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 0% 0%, #d4faf7 0%, transparent 24%),
        radial-gradient(circle at 100% 90%, #c7f4f1 0%, transparent 28%),
        radial-gradient(circle at 70% 25%, #e8fffd 0%, transparent 18%),
        var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--ink);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background:
        linear-gradient(164deg, rgba(7, 108, 114, 0.97), rgba(9, 140, 145, 0.95)),
        linear-gradient(22deg, rgba(140, 235, 231, 0.56), transparent 48%);
      color: #f3f6ff;
      padding: 26px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(183, 251, 247, 0.52), transparent 65%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #e6fffd, #8cebe7);
      display: grid;
      place-items: center;
      color: #0c5a5f;
      font-weight: 700;
    }

    .brand-title {
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
    }

    .nav-link {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      color: rgba(242, 246, 255, 0.94);
      font-weight: 500;
      transition: transform 120ms ease, background 120ms ease;
      position: relative;
      z-index: 1;
    }

    .nav-link:hover {
      transform: translateX(3px);
      background: rgba(255, 255, 255, 0.17);
    }

    .nav-link.active {
      background: #ffffff;
      color: #0d5f64;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .main {
      padding: 28px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      animation: rise-in 350ms ease;
    }

    .page-header p {
      color: var(--ink-soft);
      margin: 4px 0 0;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .dashboard-metrics {
      gap: 24px;
      margin-bottom: 24px;
    }

    .dashboard-panels {
      gap: 24px;
      margin-top: 8px;
      align-items: stretch;
    }

    .sales-layout {
      gap: 24px;
      align-items: stretch;
    }

    .sales-shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    .sales-form-sidebar {
      position: sticky;
      top: 20px;
    }

    .sales-content {
      display: grid;
      gap: 24px;
      min-width: 0;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .totals-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      align-items: stretch;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      animation: rise-in 320ms ease;
    }

    .panel-accent-teal {
      border-top: 4px solid #10b7b0;
      background: linear-gradient(180deg, #ffffff 0%, #f3fffe 100%);
    }

    .panel-accent-blue {
      border-top: 4px solid #3b82f6;
      background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
    }

    .panel-accent-green {
      border-top: 4px solid #22c55e;
      background: linear-gradient(180deg, #ffffff 0%, #f3fff6 100%);
    }

    .panel-accent-amber {
      border-top: 4px solid #f59e0b;
      background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
    }

    .panel-accent-purple {
      border-top: 4px solid #8b5cf6;
      background: linear-gradient(180deg, #ffffff 0%, #f8f4ff 100%);
    }

    .metric {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 8px;
      min-height: 118px;
      background: linear-gradient(160deg, #ffffff, var(--metric-tint, #f3fffe));
      border-top: 4px solid var(--metric-accent, #10b7b0);
    }

    .metric::after {
      content: "";
      position: absolute;
      right: -24px;
      top: -24px;
      width: 88px;
      height: 88px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(16, 183, 176, 0.1), transparent 70%);
      pointer-events: none;
    }

    .metric-total {
      --metric-accent: #3b82f6;
      --metric-tint: #f4f8ff;
    }

    .metric-transactions {
      --metric-accent: #22c55e;
      --metric-tint: #f3fff6;
    }

    .metric-products {
      --metric-accent: #f59e0b;
      --metric-tint: #fffaf0;
    }

    .metric small {
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .metric strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.2rem, 2.6vw, 1.7rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
      color: var(--metric-accent, var(--brand));
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 600;
      font-family: "IBM Plex Sans", sans-serif;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(16, 133, 137, 0.28);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0da9a2, #27d0c8);
      color: #ffffff;
    }

    .btn-secondary {
      background: #e9fbfa;
      color: #0f686d;
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: #f8e7e5;
      color: var(--danger);
      border: 1px solid #f2cdca;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 0.9rem;
      color: #2d6063;
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
      background: #fcfffb;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #57c5c0;
      box-shadow: 0 0 0 3px rgba(62, 194, 186, 0.22);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.96rem;
    }

    th,
    td {
      text-align: left;
      padding: 11px;
      border-bottom: 1px solid #edf3eb;
    }

    th {
      color: #4f7477;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      display: inline-block;
      background: #e5fbf9;
      color: #0f6f73;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-link {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 0.84rem;
      border: 1px solid var(--border);
      background: #eefbfb;
      color: #0f666b;
      font-weight: 600;
    }

    .summary-mini {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .summary-mini .card {
      padding: 14px;
      box-shadow: 0 8px 20px rgba(10, 96, 102, 0.09);
    }

    .summary-mini strong {
      display: block;
      font-size: 1.2rem;
      margin-top: 4px;
      color: var(--brand);
      font-family: "Space Grotesk", sans-serif;
    }

    .auth-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .auth-hero {
      background:
        linear-gradient(145deg, rgba(8, 100, 106, 0.88), rgba(17, 162, 165, 0.8)),
        url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1400&q=80") center/cover;
      padding: 46px;
      color: #eefcf3;
      display: grid;
      align-content: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .auth-hero::before,
    .auth-hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(3px);
    }

    .auth-hero::before {
      width: 210px;
      height: 210px;
      right: -40px;
      top: -40px;
      background: radial-gradient(circle, rgba(209, 255, 251, 0.78), transparent 70%);
    }

    .auth-hero::after {
      width: 220px;
      height: 220px;
      left: -60px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(141, 237, 232, 0.58), transparent 70%);
    }

    .auth-panel {
      display: grid;
      align-content: center;
      padding: 34px;
    }

    .auth-card {
      max-width: 470px;
      width: 100%;
    }

    .auth-card .card {
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(140deg, #ffffff, #f2fffe);
      box-shadow: 0 20px 44px rgba(15, 102, 106, 0.14);
    }

    .auth-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .auth-chip {
      padding: 11px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.32);
      font-size: 0.86rem;
      backdrop-filter: blur(2px);
    }

    .auth-chip strong {
      display: block;
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      color: #ecfffd;
    }

    .auth-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 9px;
      position: relative;
      z-index: 1;
    }

    .auth-list li {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
    }

    .auth-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #a7f3ef, #27d0c8);
      box-shadow: 0 0 0 4px rgba(208, 252, 249, 0.22);
      flex-shrink: 0;
    }

    .summary-card {
      border-top: 4px solid #3b82f6;
      background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
    }

    .summary-card-alt {
      border-top: 4px solid #10b7b0;
      background: linear-gradient(180deg, #ffffff 0%, #f3fffe 100%);
    }

    .summary-card-warm {
      border-top: 4px solid #22c55e;
      background: linear-gradient(180deg, #ffffff 0%, #f3fff6 100%);
    }

    .summary-card-soft {
      border-top: 4px solid #f59e0b;
      background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
    }

    .muted {
      color: #537465;
      font-size: 0.92rem;
    }

    .empty {
      border: 1px dashed #c4d8ca;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #557060;
      background: #f8fcf9;
    }

    @keyframes rise-in {
      from {
        transform: translateY(7px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 1024px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .auth-wrap {
        grid-template-columns: 1fr;
      }

      .auth-hero {
        min-height: 220px;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 18px;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .sales-shell {
        grid-template-columns: 1fr;
      }

      .sales-form-sidebar {
        position: static;
      }

      .summary-mini {
        grid-template-columns: 1fr;
      }

      .page-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
