<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Jambo Sphere POS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #f6f8ff;
      --bg-soft: #ecf0ff;
      --surface: #ffffff;
      --ink: #172034;
      --ink-soft: #43516d;
      --brand: #2f67f6;
      --brand-soft: #dfe8ff;
      --accent: #ff8b42;
      --accent-2: #ff5f8f;
      --accent-3: #14b8a6;
      --danger: #c0392b;
      --border: #d7def0;
      --shadow: 0 14px 30px rgba(26, 34, 67, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 0% 0%, #ffd7c0 0%, transparent 24%),
        radial-gradient(circle at 100% 90%, #cfe2ff 0%, transparent 28%),
        radial-gradient(circle at 70% 25%, #d8fff6 0%, transparent 18%),
        var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--ink);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background:
        linear-gradient(164deg, rgba(18, 52, 137, 0.96), rgba(45, 24, 105, 0.96)),
        linear-gradient(22deg, rgba(255, 101, 78, 0.72), transparent 48%);
      color: #f3f6ff;
      padding: 26px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(255, 143, 95, 0.55), transparent 65%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #ffd166, #ff5f8f);
      display: grid;
      place-items: center;
      color: #4d2239;
      font-weight: 700;
    }

    .brand-title {
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
    }

    .nav-link {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      color: rgba(242, 246, 255, 0.94);
      font-weight: 500;
      transition: transform 120ms ease, background 120ms ease;
      position: relative;
      z-index: 1;
    }

    .nav-link:hover {
      transform: translateX(3px);
      background: rgba(255, 255, 255, 0.17);
    }

    .nav-link.active {
      background: #ffffff;
      color: #28387a;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .main {
      padding: 28px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      animation: rise-in 350ms ease;
    }

    .page-header p {
      color: var(--ink-soft);
      margin: 4px 0 0;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      animation: rise-in 320ms ease;
    }

    .metric {
      display: grid;
      gap: 8px;
      background: linear-gradient(160deg, #ffffff, #f6f9ff);
    }

    .metric small {
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .metric strong {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.7rem;
      color: var(--brand);
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 600;
      font-family: "IBM Plex Sans", sans-serif;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(52, 84, 197, 0.24);
    }

    .btn-primary {
      background: linear-gradient(135deg, #2f67f6, #14b8a6);
      color: #ffffff;
    }

    .btn-secondary {
      background: #fff2e8;
      color: #914d1f;
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: #f8e7e5;
      color: var(--danger);
      border: 1px solid #f2cdca;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 0.9rem;
      color: #2e4068;
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
      background: #fcfffb;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #7091ff;
      box-shadow: 0 0 0 3px rgba(88, 116, 221, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.96rem;
    }

    th,
    td {
      text-align: left;
      padding: 11px;
      border-bottom: 1px solid #edf3eb;
    }

    th {
      color: #60729a;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      display: inline-block;
      background: #ffe9f2;
      color: #9b2a56;
    }

    .auth-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .auth-hero {
      background:
        linear-gradient(145deg, rgba(26, 45, 116, 0.86), rgba(170, 52, 87, 0.78)),
        url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1400&q=80") center/cover;
      padding: 46px;
      color: #eefcf3;
      display: grid;
      align-content: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .auth-hero::before,
    .auth-hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(3px);
    }

    .auth-hero::before {
      width: 210px;
      height: 210px;
      right: -40px;
      top: -40px;
      background: radial-gradient(circle, rgba(255, 186, 96, 0.8), transparent 70%);
    }

    .auth-hero::after {
      width: 220px;
      height: 220px;
      left: -60px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(43, 214, 193, 0.56), transparent 70%);
    }

    .auth-panel {
      display: grid;
      align-content: center;
      padding: 34px;
    }

    .auth-card {
      max-width: 470px;
      width: 100%;
    }

    .auth-card .card {
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(140deg, #ffffff, #f7f8ff);
      box-shadow: 0 20px 44px rgba(34, 39, 88, 0.14);
    }

    .auth-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .auth-chip {
      padding: 11px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.32);
      font-size: 0.86rem;
      backdrop-filter: blur(2px);
    }

    .auth-chip strong {
      display: block;
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      color: #fff5e9;
    }

    .auth-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 9px;
      position: relative;
      z-index: 1;
    }

    .auth-list li {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.95rem;
    }

    .auth-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffd166, #ff5f8f);
      box-shadow: 0 0 0 4px rgba(255, 233, 189, 0.2);
      flex-shrink: 0;
    }

    .muted {
      color: #537465;
      font-size: 0.92rem;
    }

    .empty {
      border: 1px dashed #c4d8ca;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #557060;
      background: #f8fcf9;
    }

    @keyframes rise-in {
      from {
        transform: translateY(7px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 1024px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .grid-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .auth-wrap {
        grid-template-columns: 1fr;
      }

      .auth-hero {
        min-height: 220px;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 18px;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .page-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
